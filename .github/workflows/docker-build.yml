## Name of the workflow
name: Docker Build and Push

## Trigger policy
## This workflow runs when:
## - Code is pushed to the master branch
## - A pull request is opened against master
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

## Jobs to be executed
jobs:
  build:
    ## Define the OS environment
    runs-on: ubuntu-latest

    ## Steps to execute
    steps:

      ## Step 1: Checkout repository code
      - name: Checkout Repository
        uses: actions/checkout@v2

      ## Step 2: Enable QEMU (for multi-platform builds)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1

      ## Step 3: Enable Docker Buildx (advanced builder)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      ## Step 4: Login to DockerHub using secrets
      - name: Login to DockerHub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      ## Step 5: Debug repository structure (optional)
      - name: Debug - Verify Files
        run: ls -R

      ## Step 6: Build and push Docker image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./solutions/python-helloworld
          file: ./solutions/python-helloworld/Dockerfile
          platforms: linux/amd64
          push: true
          tags: oyaroh/python-helloworld:latest