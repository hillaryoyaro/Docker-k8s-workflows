## Name of the workflow.
## This defines how the workflow will appear in the GitHub Actions tab.
name: Pytest

## Set the trigger policy.
## In this case, the workflow is executed on every `push` event,
## meaning whenever new code is pushed to the repository.
on: [push]

## Define the jobs to be executed by the workflow.
jobs:

  ## Set the name of the job
  build:

    ## Configure the operating system the workflow should run on.
    ## In this case, the job runs on the latest Ubuntu runner.
    runs-on: ubuntu-latest

    ## Define a strategy to run the job across multiple Python versions.
    ## `fail-fast: false` ensures that if one version fails,
    ## the others will still continue executing.
    strategy:
      fail-fast: false
      matrix:
        python-version: [3.9, 3.10, 3.11, 3.12]

    ## Optional: Set environment variables.
    ## This ensures compatibility with newer Node.js versions used by GitHub Actions.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    ## Define a sequence of steps to be executed.
    steps:

    ## Step 1: Checkout the repository code.
    ## Uses the latest stable version of the checkout action.
    - name: Checkout repository
      uses: actions/checkout@v4

    ## Step 2: Set up Python environment.
    ## Installs the specified Python version from the matrix above.
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    ## Step 3: Install all necessary dependencies.
    ## This includes upgrading pip, installing pytest,
    ## and installing project dependencies if requirements.txt exists.
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    ## Step 4: Run tests using pytest.
    ## Executes all test cases in the repository.
    - name: Run tests with pytest
      run: |
        pytest