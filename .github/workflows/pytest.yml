## Name of the workflow
## This will appear in the GitHub Actions tab
name: Pytest

## Set the trigger policy
## The workflow runs every time code is pushed to the repository
on: [push]

## Define the jobs to be executed
jobs:

  ## Job name: build
  ## This job will run tests across multiple Python versions
  build:

    ## Specify the operating system (Ubuntu latest runner)
    runs-on: ubuntu-latest

    ## Strategy allows running the job on multiple configurations
    ## Here, we test across multiple supported Python versions
    strategy:
      matrix:
        python-version: [3.9, 3.10, 3.11, 3.12]

    ## Define the sequence of steps
    steps:

    ## Step 1: Checkout repository code
    ## Uses the latest stable version of checkout action (v4)
    - name: Checkout repository
      uses: actions/checkout@v4

    ## Step 2: Set up Python environment
    ## Installs the specified Python version from the matrix
    ## Uses the latest version of setup-python (v5)
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    ## Step 3: Cache dependencies (optional but improves performance)
    ## This speeds up builds by caching installed packages
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    ## Step 4: Install dependencies
    ## Upgrades pip and installs pytest + project dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    ## Step 5: Run tests
    ## Executes all tests using pytest
    - name: Run tests with pytest
      run: |
        pytest