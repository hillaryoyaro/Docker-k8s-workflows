## Name of the workflow
name: Jira Ticket Automation

## Trigger policy
## This workflow runs when:
## - A pull request is opened or reopened
## - Manually triggered from GitHub Actions UI
on:
  pull_request_target:
    types: [opened, reopened]
  workflow_dispatch:

## Jobs definition
jobs:
  create-jira-ticket:
    name: Convert GitHub PR to Jira Issue
    runs-on: ubuntu-latest

    steps:

      ## Step 1: Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v2

      ## Step 2: Authenticate with Jira
      - name: Jira Login
        uses: atlassian/gajira-login@master
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      ## Step 3: Create Jira ticket
      - name: Create Jira Issue
        id: create
        uses: atlassian/gajira-create@master
        with:
          project: CONUPDATE
          issuetype: Task
          summary: |
            GitHub PR | Repo: ${{ github.repository }} | PR# ${{ github.event.number }}
          description: |
            Repository: https://github.com/${{ github.repository }}
            PR Number: ${{ github.event.pull_request.number }}
            Title: ${{ github.event.pull_request.title }}
            Description: ${{ github.event.pull_request.body }}

      ## Step 4: Log created ticket
      - name: Log Jira Issue
        run: echo "Created Jira Issue ${{ steps.create.outputs.issue }}"